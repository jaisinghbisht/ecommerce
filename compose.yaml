services:
  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Service DNS name "db" (from this compose file)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ecommerce_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      # keep DB health check enabled locally
      HEALTH_DB_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_db
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: