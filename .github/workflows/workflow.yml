# CI: checkout, set up JDK 17, run maven build/tests with caching, report tests
name: CI - Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 and cache Maven deps
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
          # Point cache to the backend's pom.xml
          cache-dependency-path: 'backend/pom.xml'

      - name: Build and run tests (Maven)
        # Execute the command inside the backend directory
        working-directory: ./backend
        run: mvn -B clean install
        env:
          MAVEN_OPTS: -Xmx2G

      - name: Upload surefire test reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          # Update path to look inside the backend directory
          path: 'backend/target/surefire-reports/**'

      - name: Publish JUnit test report to Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit tests
          # Update path to look inside the backend directory
          path: 'backend/target/surefire-reports/TEST-*.xml'
          reporter: java-junit
          
      - name: Build Docker Images with Docker Compose
        run: docker compose build
