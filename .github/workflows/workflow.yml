# CI: checkout, set up JDK 17, run maven build/tests with caching, report tests, build Docker image (no push)
name: CI - Build & Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17 and cache Maven deps
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'

      - name: Build and run tests (Maven)
        run: mvn -B clean install
        env:
          MAVEN_OPTS: -Xmx2G

      - name: Upload surefire test reports (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/**'

      - name: Publish JUnit test report to Checks
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit tests
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ecommerce:${{ github.sha }}