<div class="card h-100 product-card" [routerLink]="['/products', product.id]">
  <div class="card-body d-flex flex-column">
    <h5 class="card-title">{{ product.name }}</h5>
    <p class="card-text text-muted">SKU: {{ product.sku }}</p>
    <p class="card-text">{{ product.description | slice:0:100 }}...</p>
    <div class="mt-auto">
      <p class="card-text"><strong>Category:</strong> {{ product.categoryName }}</p>
      <p class="card-text price"><strong>Price:</strong> {{ product.price | currency }}</p>
    </div>
  </div>
</div>
