<div class="container mt-4">
  <h1>Product Catalog</h1>
  <app-search-bar (searchChange)="onSearchChange($event)"></app-search-bar>

  <div *ngIf="productsPage$ | async as page; else loading">
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <div *ngIf="!error && page.content.length > 0; else emptyState" class="row">
      <div *ngFor="let product of page.content" class="col-md-4 mb-4">
        <app-product-card [product]="product"></app-product-card>
      </div>
    </div>

    <app-pagination
      *ngIf="!error && page.totalPages > 1"
      [currentPage]="currentPage"
      [totalPages]="page.totalPages"
      (pageChange)="onPageChange($event)">
    </app-pagination>

    <ng-template #emptyState>
      <div class="alert alert-info">No products found matching your criteria.</div>
    </ng-template>
  </div>

  <ng-template #loading>
    <div class="d-flex justify-content-center mt-5">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  </ng-template>
</div>
